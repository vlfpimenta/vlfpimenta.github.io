<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraSegura v6.7 - Mesa de Projetos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --header-h: 64px; }
        body { background: #020617; color: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        #map, #list-view { height: calc(100vh - var(--header-h)); width: 100%; margin-top: var(--header-h); position: absolute; top: 0; left: 0; }
        #list-view { background: #020617; z-index: 5; overflow-y: auto; display: none; padding: 2rem; }
        #map { z-index: 1; background: #020617; }
        .locked-mode .leaflet-marker-icon, .locked-mode .leaflet-interactive { pointer-events: none !important; }
        .leaflet-div-icon, .custom-div-icon, .leaflet-marker-icon { background: transparent !important; border: none !important; box-shadow: none !important; }

        .marker-pin { width: 44px; height: 44px; border-radius: 50% 50% 50% 0; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -22px 0 0 -22px; border: 3px solid #ffffff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 1000 !important; transition: all 0.2s ease; }
        .marker-pin svg { transform: rotate(45deg); color: white; }
        .marker-pin.selected { border-color: #3b82f6; box-shadow: 0 0 25px #3b82f6; transform: rotate(-45deg) scale(1.1); }
        .online-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: all 0.2s ease; }
        .online-dot.selected { border-color: #3b82f6; box-shadow: 0 0 12px #3b82f6; transform: scale(1.4); }
        .vertex-handle { width: 12px; height: 12px; background: #3b82f6; border: 2px solid white; border-radius: 50%; cursor: move; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
        .midpoint-handle { width: 10px; height: 10px; background: rgba(59, 130, 246, 0.5); border: 1px solid white; border-radius: 50%; cursor: crosshair; }

        @keyframes flow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 60; } }
        .data-flow-line { stroke-dasharray: 10, 10; animation: flow 1s linear infinite; }
        .offline-line { stroke-dasharray: 5, 15; opacity: 0.3; stroke: #ef4444 !important; }

        #logo-menu { position: absolute; top: 60px; left: 16px; width: 260px; background-color: #0f172a; border: 2px solid #334155; border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8); z-index: 3000; display: none; }
        #logo-menu.show { display: block; animation: slideIn 0.2s ease-out; }
        .fab-container { position: fixed; right: 24px; bottom: 24px; z-index: 5000; display: flex; flex-direction: column-reverse; align-items: center; gap: 12px; }
        .fab-main { width: 64px; height: 64px; border-radius: 50%; background-color: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); cursor: pointer; border: 3px solid #60a5fa; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .fab-main.active { transform: rotate(135deg); background-color: #ef4444; border-color: #f87171; }
        .fab-items { display: flex; flex-direction: column-reverse; gap: 12px; pointer-events: none; opacity: 0; transform: translateY(15px); transition: 0.3s ease; }
        .fab-items.open { pointer-events: auto; opacity: 1; transform: translateY(0); }
        .fab-item-btn { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #1e293b; border: 2px solid #334155; position: relative; transition: all 0.2s; }
        .fab-item-btn.selected { border-color: #3b82f6; background-color: #0f172a; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); transform: scale(1.1); }
        .alert-fab { position: fixed; left: 24px; bottom: 24px; z-index: 5000; width: 64px; height: 64px; border-radius: 50%; background-color: #ef4444; color: white; display: none; align-items: center; justify-content: center; box-shadow: 0 8px 30px rgba(239, 68, 68, 0.6); cursor: pointer; border: 3px solid #f87171; }
        #mode-indicator-bar { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 4500; background: #3b82f6; color: white; padding: 10px 24px; border-radius: 9999px; font-size: 11px; font-weight: 900; display: none; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5); border: 2px solid rgba(255,255,255,0.3); text-transform: uppercase; align-items: center; gap: 15px; }
        .mode-btn { background: white; color: #3b82f6; padding: 4px 12px; border-radius: 999px; font-size: 9px; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .mode-btn:hover { background: #f1f5f9; transform: scale(1.05); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        #details-panel, #offline-panel { transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; pointer-events: none; transform: translateX(100%); z-index: 4000; }
        #details-panel.show, #offline-panel.show { opacity: 1; transform: translateX(0); pointer-events: auto; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-orange { animation: pulse-orange 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden font-sans">

    <div id="app-container">
        <div id="mode-indicator-bar">
            <span id="mode-text">Modo Ativo</span>
            <div id="mode-actions" class="flex gap-2"></div>
        </div>

        <div id="vps-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Pronto</span>
        </div>

        <div id="alert-fab" onclick="openOfflinePanel()" class="alert-fab">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <div id="alert-count" class="absolute -top-1 -right-1 bg-white text-red-600 w-7 h-7 rounded-full flex items-center justify-center font-black text-xs border-2 border-red-600">0</div>
        </div>

        <header class="fixed top-0 left-0 right-0 h-[var(--header-h)] bg-[#0f172a] border-b-2 border-slate-800 z-[2000] flex items-center justify-between px-4 sm:px-8 shadow-2xl">
            <div class="flex items-center relative">
                <button onclick="handleLogoInteraction()" class="flex items-center space-x-3 hover:bg-slate-800/50 p-2 rounded-xl transition-all active:scale-95">
                    <div class="logo-container p-2.5 bg-blue-600 rounded-xl border border-blue-400">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1 class="header-title font-black tracking-tighter text-sm sm:text-2xl uppercase">Infra<span class="text-blue-500">Segura</span></h1>
                </button>

                <div id="logo-menu">
                    <div class="p-4 border-b border-slate-800 bg-slate-950/50 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Configurações</div>
                    <div class="p-2 space-y-1 text-white text-[10px] font-bold uppercase">
                        <button onclick="exportMap()" class="w-full p-3 hover:bg-blue-600 rounded-xl transition-all text-left flex justify-between">Salvar Projeto <span>💾</span></button>
                        <button onclick="document.getElementById('import-input').click()" class="w-full p-3 hover:bg-emerald-600 rounded-xl transition-all text-left flex justify-between">Abrir Projeto <span>📂</span></button>
                        <hr class="border-slate-800 my-1">
                        <button onclick="document.getElementById('bg-input').click()" class="w-full p-3 hover:bg-indigo-600 rounded-xl transition-all text-left flex justify-between">Planta de Fundo <span>🖼️</span></button>
                        <button onclick="resetToWorldMap()" class="w-full p-3 hover:bg-slate-700 rounded-xl transition-all text-left flex justify-between">Mapa Mundi <span>🌍</span></button>
                        <hr class="border-slate-800 my-1">
                        <button onclick="toggleAppLock()" class="w-full p-3 hover:bg-orange-600 rounded-xl transition-all text-left">Bloquear Painel</button>
                    </div>
                </div>
                <input type="file" id="import-input" class="hidden" accept=".json" onchange="importMap(event)">
                <input type="file" id="bg-input" class="hidden" accept="image/*" onchange="importBackground(event)">
            </div>

            <div class="flex items-center space-x-1.5 bg-slate-950 border border-slate-800 p-1 rounded-2xl">
                <button onclick="toggleView('map')" id="btn-map" class="px-5 py-2 rounded-xl text-[11px] font-black bg-blue-600 text-white shadow-xl transition-all uppercase">Mapa</button>
                <button onclick="toggleView('list')" id="btn-list" class="px-5 py-2 rounded-xl text-[11px] font-black text-slate-500 hover:text-white transition-all uppercase">Lista</button>
            </div>

            <button onclick="locateMe()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 shadow-lg active:scale-90 transition-transform">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            </button>
        </header>

        <div id="fab-container" class="fab-container">
            <div id="fab-main" onclick="toggleFab()" class="fab-main">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            <div id="fab-items" class="fab-items">
                <button onclick="setMode('core_switch')" id="tool-core_switch" class="fab-item-btn tool-btn" title="Switch Principal" style="color: #6366f1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="12" x="2" y="6" rx="2"/><path d="M6 12h.01"/><path d="M10 12h.01"/><path d="M14 12h.01"/><path d="M18 12h.01"/><path d="M2 10V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2"/></svg></button>
                <button onclick="setMode('converter')" id="tool-converter" class="fab-item-btn tool-btn" title="Conversor" style="color: #fbbf24"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></button>
                <button onclick="setMode('switch')" id="tool-switch" class="fab-item-btn tool-btn" title="Switch" style="color: #34d399"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/><path d="M14 18h.01"/><path d="M18 18h.01"/></svg></button>
                <button onclick="setMode('camera')" id="tool-camera" class="fab-item-btn tool-btn" title="Câmera" style="color: #60a5fa"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></button>
                <button onclick="setMode('server')" id="tool-server" class="fab-item-btn tool-btn" title="Servidor" style="color: #a78bfa"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="10" x="2" y="2" rx="2"/><rect width="20" height="10" x="2" y="12" rx="2"/><path d="M6 6h.01"/><path d="M10 6h.01"/></svg></button>
                <button onclick="toggleLinking()" id="link-btn" class="fab-item-btn tool-btn" title="Conectar" style="color: #94a3b8"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54"/></svg></button>
            </div>
        </div>

        <div id="map"></div>
        <div id="list-view">
            <h2 class="text-2xl font-black uppercase mb-8 tracking-tighter text-blue-500 border-b border-slate-800 pb-4">Hierarquia Técnica</h2>
            <div id="tree-container"></div>
        </div>

        <div id="offline-panel" class="fixed right-6 top-24 bottom-24 w-96 bg-slate-900 border-2 border-red-500/40 rounded-[3rem] p-8 flex flex-col shadow-4xl mobile-full text-white">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black uppercase text-red-500 tracking-widest italic">Falhas Detectadas</h3>
                <button onclick="closeOfflinePanel()" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div id="offline-list" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
        </div>

        <div id="details-panel" class="fixed right-6 top-24 bottom-24 w-80 bg-slate-900 border-2 border-slate-800 rounded-[3rem] p-8 flex flex-col shadow-4xl mobile-full text-white overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Ativo</h3>
                <button onclick="closePanel()" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div id="details-content" class="flex-1 overflow-y-auto space-y-6"></div>
        </div>

        <div id="password-modal" class="fixed inset-0 z-[7000] hidden flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm">
            <div class="w-full max-w-xs bg-slate-900 border-2 border-slate-700 rounded-[2.5rem] p-10 text-center text-white shadow-4xl">
                <h3 class="text-xl font-black uppercase mb-8 tracking-tighter">Segurança</h3>
                <input type="password" id="unlock-pass" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl p-5 text-center text-2xl tracking-[0.5em] mb-6 outline-none focus:border-blue-500 text-white" placeholder="•••••">
                <button onclick="checkUnlock()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase shadow-lg">Desbloquear</button>
            </div>
        </div>
    </div>

    <script>
        const VPS_API_URL = "https://infrasec.vlfp.com.br/api"; 
        let nodes = []; let links = []; let map; let selectedId = null;
        let isLinking = false; let isDrawingPath = false; 
        let drawingNodeId = null; let linkSourceId = null; 
        let activeStatuses = {}; let currentMode = null; 
        let isLocked = false; let logoClicks = 0; let isMenuOpen = false;
        let individualLayer, linksLayer, handlesLayer, worldTiles, bgImageLayer;
        let currentBackgroundBase64 = null;

        const CONFIG = {
            core_switch: { label: 'Switch Principal', color: '#6366f1', hasIp: true, icon: '<rect width="20" height="12" x="2" y="6" rx="2"/><path d="M6 12h.01"/><path d="M10 12h.01"/><path d="M14 12h.01"/><path d="M18 12h.01"/><path d="M2 10V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2"/>', rank: 0 },
            converter: { label: 'Conversor', color: '#f59e0b', hasIp: false, icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>', rank: 1 },
            switch: { label: 'Switch', color: '#10b981', hasIp: false, icon: '<rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/><path d="M14 18h.01"/><path d="M18 18h.01"/>', rank: 2 },
            camera: { label: 'Câmera', color: '#3b82f6', hasIp: true, icon: '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>', rank: 3 },
            server: { label: 'Servidor', color: '#a78bfa', hasIp: true, icon: '<rect width="20" height="10" x="2" y="2" rx="2"/><rect width="20" height="10" x="2" y="12" rx="2"/><path d="M6 6h.01"/><path d="M10 6h.01"/>', rank: 4 }
        };

        function exportMap() {
            const data = JSON.stringify({ nodes, links, background: currentBackgroundBase64, view: { center: map.getCenter(), zoom: map.getZoom() } });
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Projeto_${new Date().toISOString().split('T')[0]}.json`; a.click();
            showToast("Projeto Exportado.");
        }

        function importMap(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    nodes = data.nodes || []; links = data.links || [];
                    if (data.background) applyBackground(data.background); else resetToWorldMap();
                    if (data.view) map.setView(data.view.center, data.view.zoom);
                    render(); showToast("Projeto Carregado.");
                    document.getElementById('logo-menu').classList.remove('show');
                } catch (err) { showToast("Arquivo Inválido."); }
            };
            reader.readAsText(file);
        }

        function importBackground(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => applyBackground(e.target.result);
            reader.readAsDataURL(file);
        }

        // --- LÓGICA DE FUNDO ESTICADO E ZOOM LIVRE ---
        function applyBackground(base64) {
            currentBackgroundBase64 = base64;
            if (worldTiles) map.removeLayer(worldTiles);
            if (bgImageLayer) map.removeLayer(bgImageLayer);

            // Estica a imagem para preencher exatamente o que está na tela no momento
            const bounds = map.getBounds();
            bgImageLayer = L.imageOverlay(base64, bounds, { zIndex: 0 }).addTo(map);

            // Configurações de Zoom para Planta Técnica
            map.setMinZoom(map.getZoom()); // Zoom out máximo é o estado atual (toda a imagem na tela)
            map.setMaxZoom(22); // Permite um zoom in "infinito"
            
            showToast("Planta de Fundo Aplicada.");
            document.getElementById('logo-menu').classList.remove('show');
        }

        function resetToWorldMap() {
            currentBackgroundBase64 = null;
            if (bgImageLayer) map.removeLayer(bgImageLayer);
            if (!map.hasLayer(worldTiles)) worldTiles.addTo(map);
            map.setMinZoom(1); map.setMaxZoom(18); // Volta limites do mapa real
            showToast("Mapa Mundi Ativo.");
            document.getElementById('logo-menu').classList.remove('show');
        }

        async function loadData() {
            try {
                const response = await fetch(`${VPS_API_URL}/data`);
                const data = await response.json();
                nodes = data.nodes || []; links = data.links || []; render();
            } catch (e) { render(); }
        }

        async function saveData() {
            try {
                await fetch(`${VPS_API_URL}/save`, { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ nodes, links })
                });
            } catch (e) { }
        }

        window.onload = () => {
            map = L.map('map', { zoomControl: false, tap: true, maxZoom: 18 }).setView([-23.5505, -46.6333], 15);
            worldTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            linksLayer = L.layerGroup().addTo(map); individualLayer = L.layerGroup().addTo(map); handlesLayer = L.layerGroup().addTo(map);
            
            map.on('click', (e) => { 
                if (isLocked) return;
                if (isDrawingPath) addVertexToPath(e.latlng);
                else if (currentMode) addNode(currentMode, e.latlng); 
                else { closePanel(); closeOfflinePanel(); document.getElementById('logo-menu').classList.remove('show'); } 
            });
            loadData();
            setTimeout(() => map.invalidateSize(), 200);
        };

        function resetTools() {
            currentMode = null; isLinking = false; isDrawingPath = false; drawingNodeId = null; linkSourceId = null; isMenuOpen = false;
            document.getElementById('mode-indicator-bar').style.display = 'none';
            document.getElementById('mode-actions').innerHTML = '';
            document.getElementById('fab-items').classList.remove('open');
            document.getElementById('fab-main').classList.remove('active');
            document.querySelectorAll('.fab-item-btn').forEach(btn => btn.classList.remove('selected'));
            render();
        }

        // --- LÓGICA DE STATUS: SWITCH SÓ CAI SE TUDO ESTIVER OFFLINE ---
        function isNodeOffline(id, visited = new Set()) {
            if (visited.has(id)) return false; visited.add(id);
            const n = nodes.find(it => it.id === id); if (!n) return true;
            if (CONFIG[n.type].hasIp && activeStatuses[id] === 'offline') return true;
            const connIds = links.filter(l => l.a === id || l.b === id).map(l => l.a === id ? l.b : l.a);
            const downstream = connIds.filter(cid => {
                const nn = nodes.find(it => it.id === cid);
                return nn && CONFIG[nn.type].rank > CONFIG[n.type].rank;
            });
            if (downstream.length === 0) return false;
            return downstream.every(depId => isNodeOffline(depId, visited));
        }

        function getDiagnostics() {
            const offlineMap = {}; nodes.forEach(n => offlineMap[n.id] = isNodeOffline(n.id));
            const alerts = [];
            nodes.forEach(n => {
                if (offlineMap[n.id]) {
                    const connIds = links.filter(l => l.a === n.id || l.b === n.id).map(l => l.a === n.id ? l.b : l.a);
                    const parentOffline = connIds.some(cid => {
                        const o = nodes.find(on => on.id === cid);
                        return o && CONFIG[o.type].rank < CONFIG[n.type].rank && offlineMap[cid];
                    });
                    if (!parentOffline) alerts.push({ id: n.id, name: n.name, type: n.type });
                }
            });
            return alerts;
        }

        function render() {
            individualLayer.clearLayers(); linksLayer.clearLayers(); handlesLayer.clearLayers();
            const statusMap = {}; nodes.forEach(n => statusMap[n.id] = isNodeOffline(n.id));
            const isEditingMode = !!(currentMode || isLinking || isDrawingPath || isMenuOpen);

            links.forEach((link) => {
                const n1 = nodes.find(n => n.id === link.a); const n2 = nodes.find(n => n.id === link.b);
                if (n1 && n2) {
                    const off = (statusMap[n1.id] || statusMap[n2.id]);
                    const pathCoords = [[n1.lat, n1.lng], ...(link.vertices || []), [n2.lat, n2.lng]];
                    L.polyline(pathCoords, { color: off ? '#ef4444' : '#3b82f6', weight: 6, opacity: 0.8, className: off ? 'offline-line' : 'data-flow-line' }).addTo(linksLayer);
                    if (!isLocked && (selectedId === link.a || selectedId === link.b)) {
                        (link.vertices || []).forEach((v, vIdx) => {
                            const h = L.marker(v, { draggable: true, icon: L.divIcon({ className: 'vertex-handle', iconSize: [12, 12] }) }).addTo(handlesLayer);
                            h.on('drag', (e) => { link.vertices[vIdx] = [e.target.getLatLng().lat, e.target.getLatLng().lng]; render(); saveData(); });
                        });
                        for (let i = 0; i < pathCoords.length - 1; i++) {
                            const p1 = pathCoords[i]; const p2 = pathCoords[i+1];
                            const mid = [(p1[0] + p2[0]) / 2, (p1[1] + p2[1]) / 2];
                            const g = L.marker(mid, { draggable: true, icon: L.divIcon({ className: 'midpoint-handle', iconSize: [10, 10] }) }).addTo(handlesLayer);
                            g.on('dragstart', () => { if (!link.vertices) link.vertices = []; link.vertices.splice(i, 0, mid); });
                            g.on('drag', (e) => { link.vertices[i] = [e.target.getLatLng().lat, e.target.getLatLng().lng]; render(); });
                            g.on('dragend', () => { saveData(); render(); });
                        }
                    }
                }
            });
            
            nodes.forEach(node => {
                const isSelected = (selectedId === node.id); const isOff = statusMap[node.id];
                let color = CONFIG[node.type].color; let html, iconSize, iconAnchor;
                if (isOff || isEditingMode) {
                    html = `<div class="marker-pin ${isSelected ? 'selected' : ''} ${isOff ? 'pulse-orange' : ''}" style="background-color: ${isOff ? '#ef4444' : color}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">${CONFIG[node.type].icon}</svg></div>`;
                    iconSize = [44, 44]; iconAnchor = [22, 44];
                } else {
                    html = `<div class="online-dot ${isSelected ? 'selected' : ''}" style="background-color: ${color}"></div>`;
                    iconSize = [14, 14]; iconAnchor = [7, 7];
                }
                const icon = L.divIcon({ html, iconSize, iconAnchor });
                const m = L.marker([node.lat, node.lng], { icon, draggable: !isLocked }).addTo(individualLayer);
                m.on('click', (e) => { L.DomEvent.stopPropagation(e); if(isLocked) return; handleNodeClick(node.id); });
                m.on('dragend', (e) => { const p = e.target.getLatLng(); node.lat = p.lat; node.lng = p.lng; render(); saveData(); });
            });
            updateAlertBadge(getDiagnostics());
        }

        function updateAlertBadge(diag) {
            const fab = document.getElementById('alert-fab'); const count = document.getElementById('alert-count');
            if (diag.length > 0) {
                fab.style.display = 'flex'; count.innerText = diag.length;
                document.getElementById('offline-list').innerHTML = diag.map(a => {
                    const n = nodes.find(it => it.id === a.id);
                    return `<div onclick="toggleView('map'); map.flyTo([${n.lat}, ${n.lng}], 18); openDetails('${a.id}');" class="p-5 bg-slate-950 border border-red-500/30 rounded-3xl cursor-pointer hover:bg-red-500/10 transition-all shadow-xl"><div class="text-[9px] font-black text-red-500 uppercase mb-1 italic tracking-widest">${CONFIG[n.type].label} OFFLINE</div><h4 class="font-black text-sm text-white uppercase">${n.name}</h4></div>`;
                }).join('');
            } else { fab.style.display = 'none'; closeOfflinePanel(); }
        }

        function handleNodeClick(id) { 
            if (isDrawingPath) return; 
            if (isLinking) { 
                if (!linkSourceId) { linkSourceId = id; showToast(`Origem: ${nodes.find(n => n.id === id).name}`); } 
                else if (linkSourceId !== id) { 
                    const n1 = nodes.find(n => n.id === linkSourceId); const n2 = nodes.find(n => n.id === id);
                    if (n1.type === 'camera' && n2.type === 'camera') { showToast("Erro."); linkSourceId = null; render(); return; }
                    let pId = (CONFIG[n1.type].rank <= CONFIG[n2.type].rank) ? n1.id : n2.id;
                    links.push({ id: 'l'+Date.now(), a: pId, b: (pId === n1.id ? n2.id : n1.id), vertices: [] }); saveData(); linkSourceId = null; render();
                } 
                return; 
            } 
            openDetails(id); 
        }

        function openDetails(id) {
            selectedId = id; const n = nodes.find(it => it.id === id);
            const panel = document.getElementById('details-panel'); panel.classList.add('show');
            document.getElementById('details-content').innerHTML = `<div class="bg-slate-950 p-6 rounded-3xl border-2 border-slate-800 text-center uppercase font-black tracking-tight"><input type="text" value="${n.name}" onchange="updateName('${id}', this.value)" class="bg-transparent w-full text-center border-none focus:ring-0"></div>${CONFIG[n.type].hasIp ? `<div class="p-4 bg-slate-800/40 rounded-2xl border border-slate-800"><p class="text-[8px] text-slate-500 mb-2 uppercase text-center">IP</p><input type="text" value="${n.ip || '0.0.0.0'}" onchange="updateIp('${id}', this.value)" class="bg-slate-950 w-full p-2 rounded-lg border border-slate-800 font-mono text-center text-blue-400 outline-none"><button onclick="toggleStatus('${id}')" class="w-full mt-3 py-3 rounded-xl text-[10px] font-black ${activeStatuses[id] === 'offline' ? 'bg-emerald-600' : 'bg-red-600'} text-white uppercase shadow-xl transition-all">Simular Status</button></div>` : ''}<button onclick="startDrawingPath('${id}')" class="w-full py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase shadow-lg mt-4">Editar Traçado</button><button onclick="deleteNode('${id}')" class="w-full py-3 text-[10px] font-bold text-slate-600 hover:text-red-500 uppercase mt-4">Remover Ativo</button>`;
            render();
        }

        function startDrawingPath(nodeId) { isDrawingPath = true; drawingNodeId = nodeId; closePanel(); const bar = document.getElementById('mode-indicator-bar'); const actions = document.getElementById('mode-actions'); bar.style.display = 'flex'; document.getElementById('mode-text').innerText = "Editando Traçado"; actions.innerHTML = `<button onclick="resetTools()" class="mode-btn">Concluir</button>`; document.getElementById('fab-main').classList.add('active'); render(); }
        function addVertexToPath(latlng) { const l = links.find(li => (li.a === drawingNodeId || li.b === drawingNodeId)); if (!l) return; if (!l.vertices) l.vertices = []; const n1 = nodes.find(n => n.id === l.a); const n2 = nodes.find(n => n.id === l.b); const points = [[n1.lat, n1.lng], ...l.vertices, [n2.lat, n2.lng]]; let minDist = Infinity; let idx = l.vertices.length; for (let i = 0; i < points.length - 1; i++) { const d = L.LineUtil.pointToSegmentDistance(map.latLngToLayerPoint(latlng), map.latLngToLayerPoint(points[i]), map.latLngToLayerPoint(points[i+1])); if (d < minDist) { minDist = d; idx = i; } } l.vertices.splice(idx, 0, [latlng.lat, latlng.lng]); render(); }
        function addNode(type, latlng) { const id = 'n'+Date.now(); const count = nodes.filter(n => n.type === type).length + 1; nodes.push({ id, type, lat: latlng.lat, lng: latlng.lng, name: `${CONFIG[type].label} ${count}`, ip: CONFIG[type].hasIp ? '192.168.1.100' : null }); saveData(); render(); showToast(`${CONFIG[type].label} adicionado.`); }
        function toggleFab() { if (isLocked) return; if (currentMode || isLinking || isDrawingPath) { resetTools(); return; } isMenuOpen = !isMenuOpen; document.getElementById('fab-items').classList.toggle('open', isMenuOpen); document.getElementById('fab-main').classList.toggle('active', isMenuOpen); render(); }
        function setMode(m) { currentMode = m; document.getElementById('mode-indicator-bar').style.display = 'flex'; document.getElementById('mode-text').innerText = `Inserindo: ${CONFIG[m].label}`; document.querySelectorAll('.fab-item-btn').forEach(btn => btn.classList.remove('selected')); document.getElementById('tool-' + m).classList.add('selected'); }
        function toggleLinking() { isLinking = true; currentMode = null; document.getElementById('mode-indicator-bar').style.display = 'flex'; document.getElementById('mode-text').innerText = "Criando Conexões"; document.querySelectorAll('.fab-item-btn').forEach(btn => btn.classList.remove('selected')); document.getElementById('link-btn').classList.add('selected'); }
        function openOfflinePanel() { document.getElementById('offline-panel').classList.add('show'); }
        function closeOfflinePanel() { document.getElementById('offline-panel').classList.remove('show'); }
        function closePanel() { document.getElementById('details-panel').classList.remove('show'); selectedId = null; render(); }
        function toggleAppLock() { isLocked = true; resetTools(); document.body.classList.add('locked-mode'); document.getElementById('fab-container').style.display = 'none'; document.getElementById('logo-menu').classList.remove('show'); closePanel(); showToast("MODO OPERAÇÃO"); }
        function checkUnlock() { if (document.getElementById('unlock-pass').value === '12345') { isLocked = false; document.body.classList.remove('locked-mode'); document.getElementById('fab-container').style.display = 'flex'; document.getElementById('password-modal').classList.add('hidden'); render(); } }
        function resetNodePath(id) { const l = links.find(li => li.a === id || li.b === id); if (l) { l.vertices = []; render(); showToast("Linha restaurada."); } }
        function updateName(id, v) { nodes.find(n => n.id === id).name = v; saveData(); render(); }
        function updateIp(id, v) { nodes.find(n => n.id === id).ip = v; saveData(); render(); }
        function toggleStatus(id) { activeStatuses[id] = activeStatuses[id] === 'offline' ? 'online' : 'offline'; openDetails(id); render(); }
        function deleteNode(id) { nodes = nodes.filter(n => n.id !== id); links = links.filter(l => l.a !== id && l.b !== id); closePanel(); render(); saveData(); }
        function handleLogoInteraction() { if (isLocked) { logoClicks++; if (logoClicks >= 3) { logoClicks = 0; document.getElementById('password-modal').classList.remove('hidden'); } } else document.getElementById('logo-menu').classList.toggle('show'); }
        function showToast(m) { const t = document.createElement('div'); t.className = "fixed bottom-12 left-1/2 -translate-x-1/2 px-10 py-3 bg-slate-950 text-white text-[10px] font-black rounded-full z-[8000] border-2 border-slate-800 shadow-2xl"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
        function toggleView(v) { document.getElementById('map').style.display = v==='map'?'block':'none'; document.getElementById('list-view').style.display = v==='list'?'block':'none'; if(v==='list') renderListView(); else map.invalidateSize(); }
        function locateMe() { if(!currentBackgroundBase64) navigator.geolocation.getCurrentPosition(p => map.flyTo([p.coords.latitude, p.coords.longitude], 17)); else showToast("Modo Planta Ativo."); }

        function renderListView() {
            const container = document.getElementById('tree-container'); container.innerHTML = '';
            const offlineMap = {}; nodes.forEach(n => offlineMap[n.id] = isNodeOffline(n.id));
            const processedIds = new Set();
            nodes.filter(n => n.type === 'core_switch').forEach(core => {
                processedIds.add(core.id); const coreEl = createTreeItem(core, offlineMap[core.id]);
                const coreChildren = document.createElement('div'); coreChildren.className = 'tree-node';
                links.filter(l => l.a === core.id || l.b === core.id).map(l => l.a === core.id ? l.b : l.a).forEach(cid => {
                    const item = nodes.find(n => n.id === cid);
                    if (item && !processedIds.has(item.id)) processSubTree(item, coreChildren, processedIds, offlineMap);
                });
                coreEl.appendChild(coreChildren); container.appendChild(coreEl);
            });
            nodes.filter(n => !processedIds.has(n.id)).forEach(item => container.appendChild(createTreeItem(item, offlineMap[item.id])));
        }

        function processSubTree(node, parentEl, processedIds, offlineMap) {
            processedIds.add(node.id); const el = createTreeItem(node, offlineMap[node.id]);
            const childCont = document.createElement('div'); childCont.className = 'tree-node';
            links.filter(l => l.a === node.id || l.b === node.id).map(l => l.a === node.id ? l.b : l.a).forEach(cid => {
                const child = nodes.find(n => n.id === cid);
                if (child && !processedIds.has(child.id) && CONFIG[child.type].rank > CONFIG[node.type].rank) processSubTree(child, childCont, processedIds, offlineMap);
            });
            if (childCont.children.length > 0) el.appendChild(childCont); parentEl.appendChild(el);
        }

        function createTreeItem(node, isOff) {
            const d = document.createElement('div'); d.className = 'mb-2';
            d.innerHTML = `<div class="tree-item ${isOff ? 'border-red-500/50 bg-red-500/5' : ''}"><div class="p-2 rounded-lg" style="background: ${isOff ? '#ef4444' : CONFIG[node.type].color}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">${CONFIG[node.type].icon}</svg></div><div class="flex-1"><p class="text-xs font-bold uppercase">${node.name}</p></div>${isOff ? '<span class="text-[8px] bg-red-600 px-1.5 rounded uppercase font-black">OFFLINE</span>' : ''}</div>`;
            return d;
        }
    </script>
</body>
</html>
