<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraSegura v5.7 - Sistema Escalonável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Core -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        :root { --header-h: 64px; }
        body { 
            background: #020617; color: #f1f5f9;
            font-family: ui-sans-serif, system-ui, sans-serif;
            overflow: hidden; width: 100vw; height: 100vh;
        }

        #map, #list-view { height: calc(100vh - var(--header-h)); width: 100%; margin-top: var(--header-h); position: absolute; top: 0; left: 0; }
        #list-view { background: #020617; z-index: 5; overflow-y: auto; display: none; padding: 2rem; }
        #map { z-index: 1; background: #020617; }
        
        /* Modo bloqueado permite apenas mover o mapa */
        .locked-mode .leaflet-marker-icon, 
        .locked-mode .leaflet-interactive { pointer-events: none !important; }

        .leaflet-div-icon, .custom-div-icon, .leaflet-marker-icon {
            background: transparent !important; border: none !important; box-shadow: none !important;
        }

        .marker-pin {
            width: 44px; height: 44px; border-radius: 50% 50% 50% 0;
            position: absolute; transform: rotate(-45deg); left: 50%; top: 50%;
            margin: -22px 0 0 -22px; border: 3px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 1000 !important;
        }
        .marker-pin svg { transform: rotate(45deg); color: white; }
        .marker-pin.selected { border-color: #3b82f6; box-shadow: 0 0 25px #3b82f6; transform: rotate(-45deg) scale(1.1); }

        .vertex-handle {
            width: 12px; height: 12px; background: #3b82f6; border: 2px solid white;
            border-radius: 50%; cursor: move; box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        .camera-cluster-custom {
            background: #1e293b; border: 3px solid #3b82f6;
            border-radius: 50%; color: white; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); font-size: 14px;
        }

        @keyframes flow { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }
        .data-flow-line { stroke-dasharray: 10, 10; animation: flow 1s linear infinite; }
        .offline-line { stroke-dasharray: 5, 15; opacity: 0.3; stroke: #ef4444 !important; }

        #logo-menu { 
            position: absolute; top: 60px; left: 16px; width: 260px; 
            background-color: #0f172a; border: 2px solid #334155; border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8); z-index: 3000; display: none;
        }
        #logo-menu.show { display: block; animation: slideIn 0.2s ease-out; }

        .fab-container { position: fixed; right: 24px; bottom: 24px; z-index: 5000; display: flex; flex-direction: column-reverse; align-items: center; gap: 12px; }
        .fab-main { 
            width: 64px; height: 64px; border-radius: 50%; background-color: #3b82f6; 
            color: white; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); cursor: pointer; border: 3px solid #60a5fa;
        }
        .fab-main.active { transform: rotate(135deg); background-color: #ef4444; border-color: #f87171; }
        .fab-items { display: flex; flex-direction: column-reverse; gap: 12px; pointer-events: none; opacity: 0; transform: translateY(15px); transition: 0.3s ease; }
        .fab-items.open { pointer-events: auto; opacity: 1; transform: translateY(0); }
        .fab-item-btn { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #1e293b; border: 2px solid #334155; position: relative; }

        #mode-indicator-bar { 
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%); 
            z-index: 4500; background: #3b82f6; color: white; 
            padding: 8px 20px; border-radius: 9999px; 
            font-size: 11px; font-weight: 900; display: none; 
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5); 
            border: 2px solid rgba(255,255,255,0.3);
            align-items: center; gap: 16px;
        }
        
        #finish-draw-btn {
            background: white; color: #3b82f6; padding: 4px 12px; border-radius: 999px;
            font-size: 10px; font-weight: 900; text-transform: uppercase;
        }

        .tree-node { border-left: 2px solid #1e293b; margin-left: 1.5rem; padding-left: 1rem; position: relative; }
        .tree-node::before { content: ""; position: absolute; left: -2px; top: 12px; width: 12px; height: 2px; background: #1e293b; }
        .tree-item { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }

        #vps-status { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 6000; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #64748b; background: #0f172a; padding: 4px 12px; border-radius: 999px; border: 1px solid #1e293b; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }

        @media (max-width: 768px) {
            .mobile-full { width: 100% !important; left: 0 !important; border-radius: 2rem 2rem 0 0 !important; height: 75vh !important; top: auto !important; bottom: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden font-sans">

    <div id="app-container">
        <div id="mode-indicator-bar" class="flex">
            <span id="mode-text">Modo de Edição</span>
            <button id="finish-draw-btn" onclick="stopDrawing()" class="hidden">Concluir Edição</button>
        </div>

        <div id="vps-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Sincronizando com vlf-vps...</span>
        </div>

        <header class="fixed top-0 left-0 right-0 h-[var(--header-h)] bg-[#0f172a] border-b-2 border-slate-800 z-[2000] flex items-center justify-between px-4 sm:px-8 shadow-2xl">
            <div class="flex items-center relative">
                <button onclick="handleLogoInteraction()" class="flex items-center space-x-3 hover:bg-slate-800/50 p-2 rounded-xl transition-all active:scale-95">
                    <div class="logo-container p-2.5 bg-blue-600 rounded-xl border border-blue-400">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1 class="header-title font-black tracking-tighter text-sm sm:text-2xl uppercase">Infra<span class="text-blue-500">Segura</span></h1>
                </button>

                <div id="logo-menu">
                    <div class="p-5 border-b border-slate-800 bg-slate-950/50 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Gestão VPS</div>
                    <div class="p-2 space-y-1 text-white text-xs font-bold uppercase">
                        <button onclick="toggleAppLock()" class="w-full p-4 hover:bg-orange-600 rounded-2xl transition-all text-left">Bloquear Painel</button>
                    </div>
                </div>
            </div>

            <div class="flex items-center space-x-1.5 bg-slate-950 border border-slate-800 p-1 rounded-2xl">
                <button onclick="toggleView('map')" id="btn-map" class="px-5 py-2 rounded-xl text-[11px] font-black bg-blue-600 text-white shadow-xl transition-all uppercase">Mapa</button>
                <button onclick="toggleView('list')" id="btn-list" class="px-5 py-2 rounded-xl text-[11px] font-black text-slate-500 hover:text-white transition-all uppercase">Lista</button>
            </div>

            <button onclick="locateMe()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 shadow-lg active:scale-90 transition-transform">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            </button>
        </header>

        <div id="fab-container" class="fab-container">
            <div id="fab-main" onclick="toggleFab()" class="fab-main">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            <div id="fab-items" class="fab-items">
                <button onclick="setMode('server')" class="fab-item-btn" title="Servidor" style="color: #a78bfa"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="10" x="2" y="2" rx="2"/><rect width="20" height="10" x="2" y="12" rx="2"/><path d="M6 6h.01"/><path d="M10 6h.01"/></svg></button>
                <button onclick="setMode('camera')" class="fab-item-btn" title="Câmera" style="color: #60a5fa"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></button>
                <button onclick="setMode('switch')" class="fab-item-btn" title="Switch" style="color: #34d399"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/><path d="M14 18h.01"/><path d="M18 18h.01"/></svg></button>
                <button onclick="setMode('converter')" class="fab-item-btn" title="Conversor" style="color: #fbbf24"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></button>
                <button onclick="toggleLinking()" id="link-btn" class="fab-item-btn" title="Conectar" style="color: #94a3b8"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54"/></svg></button>
            </div>
        </div>

        <div id="map"></div>
        <div id="list-view">
            <h2 class="text-2xl font-black uppercase mb-8 tracking-tighter text-blue-500">Árvore de Ativos</h2>
            <div id="tree-container"></div>
        </div>

        <div id="details-panel" class="fixed right-6 top-24 bottom-24 w-80 bg-slate-900 border-2 border-slate-800 rounded-[3rem] p-8 z-[1000] hidden flex flex-col shadow-4xl mobile-full text-white overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Ativo</h3>
                <button onclick="closePanel()" class="p-2 hover:bg-slate-800 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div id="details-content" class="flex-1 overflow-y-auto space-y-6"></div>
        </div>

        <div id="password-modal" class="fixed inset-0 z-[7000] hidden flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm">
            <div class="w-full max-w-xs bg-slate-900 border-2 border-slate-700 rounded-[2.5rem] p-10 text-center text-white shadow-4xl">
                <h3 class="text-xl font-black uppercase mb-8 tracking-tighter">Segurança</h3>
                <input type="password" id="unlock-pass" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl p-5 text-center text-2xl mb-6 outline-none focus:border-blue-500 text-white" placeholder="•••••">
                <button onclick="checkUnlock()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase shadow-lg">Desbloquear</button>
            </div>
        </div>
    </div>

    <script>
        // URL DA SUA API VPS (HTTPS OBRIGATÓRIO)
        const VPS_API_URL = "https://infrasec.vlfp.com.br/api"; 

        let nodes = []; let links = []; let map; let selectedId = null;
        let isLinking = false; let isDrawingPath = false; 
        let drawingNodeId = null; let linkSourceId = null; 
        let activeStatuses = {}; let currentMode = null; 
        let isLocked = false; let logoClicks = 0;

        let individualLayer, linksLayer, handlesLayer;

        const CONFIG = {
            server: { label: 'Servidor', color: '#a78bfa', hasIp: true, icon: '<rect width="20" height="10" x="2" y="2" rx="2"/><rect width="20" height="10" x="2" y="12" rx="2"/><path d="M6 6h.01"/><path d="M10 6h.01"/>' },
            camera: { label: 'Câmera', color: '#3b82f6', hasIp: true, icon: '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>' },
            switch: { label: 'Switch', color: '#10b981', hasIp: false, icon: '<rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/><path d="M14 18h.01"/><path d="M18 18h.01"/>' },
            converter: { label: 'Conversor', color: '#f59e0b', hasIp: false, icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>' }
        };

        // --- VPS SYNC ---
        async function loadData() {
            try {
                const response = await fetch(`${VPS_API_URL}/data`);
                const data = await response.json();
                nodes = data.nodes || [];
                links = data.links || [];
                document.getElementById('status-dot').classList.add('status-online');
                document.getElementById('status-text').innerText = "VPS Conectada";
                render();
            } catch (e) {
                document.getElementById('status-text').innerText = "Erro Conexão VPS";
            }
        }

        async function saveData() {
            try {
                await fetch(`${VPS_API_URL}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nodes, links })
                });
            } catch (e) { console.error("Sync Error"); }
        }

        window.onload = () => {
            map = L.map('map', { zoomControl: false, tap: true, maxZoom: 18, dragging: true }).setView([-23.5505, -46.6333], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            linksLayer = L.layerGroup().addTo(map);
            individualLayer = L.layerGroup().addTo(map);
            handlesLayer = L.layerGroup().addTo(map);

            map.on('click', (e) => { 
                if (isLocked) return;
                if (isDrawingPath) addVertexToPath(e.latlng);
                else if (currentMode) addNode(currentMode, e.latlng); 
                else { closePanel(); document.getElementById('logo-menu').classList.remove('show'); } 
            });

            loadData();
        };

        function isNodeOffline(id, visited = new Set()) {
            if (visited.has(id)) return false; visited.add(id);
            const n = nodes.find(it => it.id === id); if (!n) return true;
            if (CONFIG[n.type].hasIp) return activeStatuses[id] === 'offline';
            const connIds = links.filter(l => l.a === id || l.b === id).map(l => l.a === id ? l.b : l.a);
            let dependents = [];
            if (n.type === 'switch') dependents = connIds.filter(cid => nodes.find(nn => nn.id === cid)?.type === 'camera');
            else if (n.type === 'converter') dependents = connIds.filter(cid => nodes.find(nn => nn.id === cid)?.type === 'switch');
            if (dependents.length === 0) return false;
            return dependents.every(depId => isNodeOffline(depId, visited));
        }

        function render() {
            individualLayer.clearLayers(); linksLayer.clearLayers(); handlesLayer.clearLayers();
            const statusMap = {}; nodes.forEach(n => statusMap[n.id] = isNodeOffline(n.id));

            links.forEach((link) => {
                const n1 = nodes.find(n => n.id === link.a); const n2 = nodes.find(n => n.id === link.b);
                if (n1 && n2) {
                    const off = (statusMap[n1.id] || statusMap[n2.id]);
                    const path = [[n1.lat, n1.lng], ...(link.vertices || []), [n2.lat, n2.lng]];
                    const poly = L.polyline(path, { color: off ? '#ef4444' : '#3b82f6', weight: 6, opacity: 0.8, className: off ? 'offline-line' : 'data-flow-line' }).addTo(linksLayer);
                    
                    if (!isLocked && (selectedId === link.a || selectedId === link.b)) {
                        (link.vertices || []).forEach((v, vIdx) => {
                            const handle = L.marker(v, { draggable: true, icon: L.divIcon({ className: 'vertex-handle', iconSize: [12, 12] }) }).addTo(handlesLayer);
                            handle.on('drag', (e) => {
                                link.vertices[vIdx] = [e.target.getLatLng().lat, e.target.getLatLng().lng];
                                poly.setLatLngs([[n1.lat, n1.lng], ...link.vertices, [n2.lat, n2.lng]]);
                                saveData();
                            });
                        });
                    }
                }
            });

            nodes.forEach(node => {
                const isSelected = (selectedId === node.id); const isOff = statusMap[node.id];
                let color = CONFIG[node.type].color; if (isOff) color = '#ef4444';
                const icon = L.divIcon({ 
                    html: `<div class="marker-pin ${isSelected ? 'selected' : ''}" style="background-color: ${color}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">${CONFIG[node.type].icon}</svg></div>`, 
                    iconSize: [44, 44], iconAnchor: [22, 44]
                });
                const m = L.marker([node.lat, node.lng], { icon, draggable: !isLocked }).addTo(individualLayer);
                m.on('click', (e) => { L.DomEvent.stopPropagation(e); if(isLocked) return; handleNodeClick(node.id); });
                m.on('dragend', (e) => { const p = e.target.getLatLng(); node.lat = p.lat; node.lng = p.lng; render(); saveData(); });
            });
        }

        function renderListView() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const offlineMap = {}; nodes.forEach(n => offlineMap[n.id] = isNodeOffline(n.id));
            const getConnections = (id) => links.filter(l => l.a === id || l.b === id).map(l => l.a === id ? l.b : l.a);
            
            const processedIds = new Set();
            const converters = nodes.filter(n => n.type === 'converter');
            
            converters.forEach(conv => {
                processedIds.add(conv.id);
                const convEl = createTreeItem(conv, offlineMap[conv.id]);
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'tree-node';
                
                getConnections(conv.id).map(cid => nodes.find(n => n.id === cid)).filter(n => n && n.type === 'switch').forEach(sw => {
                    processedIds.add(sw.id);
                    const swEl = createTreeItem(sw, offlineMap[sw.id]);
                    const swChildren = document.createElement('div');
                    swChildren.className = 'tree-node';
                    getConnections(sw.id).map(cid => nodes.find(n => n.id === cid)).filter(n => n && n.type === 'camera').forEach(cam => {
                        processedIds.add(cam.id);
                        swChildren.appendChild(createTreeItem(cam, offlineMap[cam.id]));
                    });
                    swEl.appendChild(swChildren);
                    childrenContainer.appendChild(swEl);
                });
                convEl.appendChild(childrenContainer);
                container.appendChild(convEl);
            });

            nodes.filter(n => !processedIds.has(n.id)).forEach(item => container.appendChild(createTreeItem(item, offlineMap[item.id])));
        }

        function createTreeItem(node, isOff) {
            const div = document.createElement('div');
            div.className = 'mb-2';
            div.innerHTML = `<div class="tree-item ${isOff ? 'border-red-500/50' : ''}">
                <div class="p-2 rounded-lg" style="background: ${isOff ? '#ef4444' : CONFIG[node.type].color}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">${CONFIG[node.type].icon}</svg>
                </div>
                <div class="flex-1"><p class="text-xs font-bold uppercase">${node.name}</p></div>
                ${isOff ? '<span class="text-[8px] bg-red-600 px-1.5 rounded uppercase">Erro</span>' : ''}
            </div>`;
            return div;
        }

        // --- UI CONTROLS ---
        function handleNodeClick(id) { if (isDrawingPath) return; if (isLinking) { if (!linkSourceId) { linkSourceId = id; showToast(`Origem: ${nodes.find(n => n.id === id).name}`); } else if (linkSourceId !== id) { links.push({ id: 'l'+Date.now(), a: linkSourceId, b: id, vertices: [] }); linkSourceId = null; render(); saveData(); } return; } openDetails(id); }
        function openDetails(id) {
            selectedId = id; const n = nodes.find(it => it.id === id);
            const panel = document.getElementById('details-panel');
            panel.classList.remove('hidden'); panel.classList.add('show');
            const connIds = links.filter(l => l.a === id || l.b === id).map(l => l.a === id ? l.b : l.a);
            let itemsHtml = '';
            if (n.type === 'switch' || n.type === 'converter') {
                const deps = nodes.filter(vn => connIds.includes(vn.id));
                itemsHtml = `<div class="p-4 bg-slate-950/50 rounded-2xl border border-slate-800"><p class="text-[8px] text-slate-500 mb-1 uppercase">Conectados (${deps.length})</p><div class="max-h-32 overflow-y-auto space-y-1">${deps.map(c => `<div class="text-[10px] flex justify-between"><span>${c.name}</span> <span class="${activeStatuses[c.id] === 'offline' ? 'text-red-500' : 'text-emerald-500'}">●</span></div>`).join('')}</div></div>`;
            }
            document.getElementById('details-content').innerHTML = `
                <div class="bg-slate-950 p-6 rounded-3xl border-2 border-slate-800 text-center uppercase font-black tracking-tight"><input type="text" value="${n.name}" onchange="updateName('${id}', this.value)" class="bg-transparent w-full text-center border-none focus:ring-0"></div>
                ${CONFIG[n.type].hasIp ? `<button onclick="toggleStatus('${id}')" class="w-full py-4 rounded-xl text-[10px] font-black ${activeStatuses[id] === 'offline' ? 'bg-emerald-600' : 'bg-red-600'} text-white uppercase shadow-xl">Simular Teste</button>` : ''}
                ${itemsHtml}
                <button onclick="startDrawingPath('${id}')" class="w-full py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase">Editar Trajeto</button>
                <button onclick="deleteNode('${id}')" class="w-full py-3 text-[10px] font-bold text-slate-600 hover:text-red-500 uppercase mt-4">Remover Ativo</button>
            `;
            render();
        }

        function addNode(type, latlng) { const id = 'n'+Date.now(); nodes.push({ id, type, lat: latlng.lat, lng: latlng.lng, name: `${CONFIG[type].label} ${nodes.length+1}` }); render(); saveData(); }
        function updateName(id, v) { nodes.find(n => n.id === id).name = v; saveData(); render(); }
        function toggleStatus(id) { activeStatuses[id] = activeStatuses[id] === 'offline' ? 'online' : 'offline'; openDetails(id); render(); }
        function deleteNode(id) { nodes = nodes.filter(n => n.id !== id); links = links.filter(l => l.a !== id && l.b !== id); closePanel(); render(); saveData(); }
        function toggleAppLock() { isLocked = true; document.body.classList.add('locked-mode'); document.getElementById('fab-container').style.display = 'none'; document.getElementById('logo-menu').classList.remove('show'); closePanel(); showToast("MODO VISUALIZAÇÃO"); }
        function checkUnlock() { if (document.getElementById('unlock-pass').value === '12345') { isLocked = false; document.body.classList.remove('locked-mode'); document.getElementById('fab-container').style.display = 'flex'; document.getElementById('password-modal').classList.add('hidden'); render(); } }
        function startDrawingPath(nodeId) { isDrawingPath = true; drawingNodeId = nodeId; closePanel(); document.getElementById('mode-indicator-bar').style.display = 'flex'; document.getElementById('finish-draw-btn').classList.remove('hidden'); }
        function addVertexToPath(latlng) { const link = links.find(l => (l.a === drawingNodeId || l.b === drawingNodeId)); if (link) { if (!link.vertices) link.vertices = []; link.vertices.push([latlng.lat, latlng.lng]); render(); } }
        function stopDrawing() { isDrawingPath = false; document.getElementById('mode-indicator-bar').style.display = 'none'; saveData(); render(); }
        function toggleFab() { document.getElementById('fab-items').classList.toggle('open'); }
        function setMode(m) { currentMode = m; isLinking = false; showToast(`Adicionando ${m}`); }
        function toggleLinking() { isLinking = true; currentMode = null; showToast("Modo Conexão"); }
        function closePanel() { document.getElementById('details-panel').classList.remove('show'); selectedId = null; render(); }
        function toggleLogoMenu() { document.getElementById('logo-menu').classList.toggle('show'); }
        function handleLogoInteraction() { if (isLocked) { logoClicks++; if (logoClicks >= 3) { logoClicks = 0; document.getElementById('password-modal').classList.remove('hidden'); } } else toggleLogoMenu(); }
        function showToast(m) { const t = document.createElement('div'); t.className = "fixed bottom-12 left-1/2 -translate-x-1/2 px-10 py-3 bg-slate-900 text-white text-[10px] font-black rounded-full z-[8000] border-2 border-slate-800"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
        function toggleView(v) { 
            document.getElementById('map').style.display = v==='map'?'block':'none';
            document.getElementById('list-view').style.display = v==='list'?'block':'none';
            document.getElementById('btn-map').className = v==='map'?"px-5 py-2 rounded-xl text-[11px] font-black bg-blue-600 text-white shadow-xl uppercase":"px-5 py-2 rounded-xl text-[11px] font-black text-slate-500 uppercase";
            document.getElementById('btn-list').className = v==='list'?"px-5 py-2 rounded-xl text-[11px] font-black bg-blue-600 text-white shadow-xl uppercase":"px-5 py-2 rounded-xl text-[11px] font-black text-slate-500 uppercase";
            if(v==='list') renderListView(); else map.invalidateSize();
        }
        function locateMe() { navigator.geolocation.getCurrentPosition(p => map.flyTo([p.coords.latitude, p.coords.longitude], 17)); }
    </script>
</body>
</html>
