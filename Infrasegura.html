<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraSegura v3.5 - Topologia Isolada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Core -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        :root { --ui-scale: 1; --header-h: 64px; }
        .mode-4k-active { --ui-scale: 1.5; }

        body { 
            background: #020617; 
            color: #f1f5f9;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #map { height: 100vh; width: 100%; z-index: 1; background: #020617; }
        
        .leaflet-image-layer { object-fit: fill !important; pointer-events: none; }

        /* Marcadores */
        .marker-pin {
            width: 40px; height: 40px; border-radius: 50% 50% 50% 0;
            position: absolute; transform: rotate(-45deg); left: 50%; top: 50%;
            margin: -20px 0 0 -18px; border: 3px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 1000 !important;
            transition: transform 0.2s ease;
        }
        .marker-pin svg { transform: rotate(45deg); color: white; }
        .marker-pin.selected { transform: rotate(-45deg) scale(1.3); border-color: #3b82f6; z-index: 1001 !important; }

        /* Estilo Customizado para Clusters por Switch */
        .camera-cluster-custom {
            background: #0f172a;
            border: 3px solid #3b82f6;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            font-size: 14px;
        }

        @keyframes flow { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }
        .data-flow-line { stroke-dasharray: 12, 12; animation: flow 1s linear infinite; filter: drop-shadow(0 0 5px currentColor); }
        .offline-line { stroke-dasharray: 5, 15; opacity: 0.3; }

        .ui-solid { background-color: #0f172a; border: 1px solid #1e293b; }
        
        #logo-menu { 
            position: absolute; top: 60px; left: 16px; width: 240px; 
            background-color: #0f172a; border: 2px solid #334155; border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8); z-index: 3000;
            display: none;
        }
        #logo-menu.show { display: block; animation: slideIn 0.2s ease-out; }

        .fab-container { position: fixed; right: 24px; bottom: 24px; z-index: 5000; display: flex; flex-direction: column-reverse; align-items: center; gap: 12px; }
        .fab-main { 
            width: 60px; height: 60px; border-radius: 50%; background-color: #3b82f6; 
            color: white; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); cursor: pointer; border: 2px solid #60a5fa;
        }
        .fab-main.active { transform: rotate(135deg); background-color: #ef4444; border-color: #f87171; }
        
        .fab-items { display: flex; flex-direction: column-reverse; gap: 12px; pointer-events: none; opacity: 0; transform: translateY(15px); transition: 0.3s ease; }
        .fab-items.open { pointer-events: auto; opacity: 1; transform: translateY(0); }

        .fab-item-btn { 
            width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid #334155; 
            background-color: #1e293b; position: relative;
        }
        .fab-item-btn.selected { border-color: #3b82f6; background-color: #1e293b; }

        .fab-label { 
            position: absolute; right: 65px; background: #1e293b; color: white; 
            padding: 5px 14px; border-radius: 10px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; white-space: nowrap; border: 1px solid #334155; 
            opacity: 0; pointer-events: none;
        }
        .fab-item-btn:hover .fab-label { opacity: 1; right: 75px; }
        
        @media (max-width: 768px) {
            :root { --header-h: 56px; }
            .mobile-full { width: 100% !important; left: 0 !important; right: 0 !important; border-radius: 2rem 2rem 0 0 !important; height: 65vh !important; top: auto !important; bottom: 0 !important; }
            #details-panel { bottom: -100%; transition: bottom 0.3s ease; display: none; }
            #details-panel.show { bottom: 0; display: flex; }
            .fab-container { right: 20px; bottom: 20px; }
            .fab-label { display: none; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-orange { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }

        .locked .header-title, .locked .logo-chevron { display: none !important; }
        .locked .logo-container { border-color: rgba(255,255,255,0.1) !important; }
        
        .mode-indicator { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1500; background: #3b82f6; color: white; padding: 6px 16px; border-radius: 9999px; font-size: 10px; font-weight: 900; letter-spacing: 0.1em; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden">

    <div id="app-container">
        <div id="mode-badge" class="mode-indicator">MODO DE INSERÇÃO</div>

        <!-- Header -->
        <header class="fixed top-0 left-0 right-0 h-[var(--header-h)] ui-solid border-b-2 border-slate-800 z-[2000] flex items-center justify-between px-4 sm:px-6 shadow-2xl transition-all duration-500">
            <div class="flex items-center relative">
                <button id="main-logo-btn" onclick="handleLogoInteraction()" class="flex items-center space-x-2 sm:space-x-3 hover:bg-slate-800/50 p-1.5 sm:p-2 rounded-xl transition-all group active:scale-95">
                    <div class="logo-container p-2 bg-blue-600 rounded-lg border border-blue-400">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1 class="header-title font-black tracking-tighter text-sm sm:text-xl uppercase">Infra<span class="text-blue-500">Segura</span></h1>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="logo-chevron text-slate-600"><path d="m6 9 6 6 6-6"/></svg>
                </button>

                <div id="logo-menu">
                    <div class="p-4 border-b border-slate-800 bg-slate-950/50 text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center">Gestão de Ativos</div>
                    <div class="p-2 space-y-1">
                        <button onclick="openSettings(); toggleLogoMenu();" class="w-full flex items-center space-x-3 p-3 hover:bg-blue-600 rounded-xl transition-all group text-left">
                            <span class="text-xs font-bold uppercase">Configurações</span>
                        </button>
                        <button onclick="toggleAppLock()" class="w-full flex items-center space-x-3 p-3 hover:bg-orange-600 rounded-xl transition-all group text-left">
                            <span class="text-xs font-bold uppercase">Bloquear Edição</span>
                        </button>
                        <button onclick="resetToWorldMap()" class="w-full flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all group text-left">
                            <span class="text-xs font-bold uppercase">Voltar ao Globo</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center space-x-1 bg-slate-950 border border-slate-800 p-1 rounded-xl">
                <button onclick="toggleView('map')" id="btn-map" class="px-3 sm:px-6 py-1.5 rounded-lg text-[10px] sm:text-xs font-black bg-blue-600 text-white shadow-lg transition-all">MAPA</button>
                <button onclick="toggleView('list')" id="btn-list" class="px-3 sm:px-6 py-1.5 rounded-lg text-[10px] sm:text-xs font-black text-slate-500 hover:text-white">TABELA</button>
            </div>

            <button onclick="locateMe()" class="p-2 sm:p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 shadow-lg">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            </button>
        </header>

        <!-- FAB Menu Principal -->
        <div id="fab-container" class="fab-container">
            <div id="fab-main" onclick="toggleFab()" class="fab-main">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>

            <div id="fab-items" class="fab-items">
                <button onclick="setMode('server')" id="tool-server" class="fab-item-btn tool-btn" style="color: #a78bfa">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="10" x="2" y="2" rx="2"/><rect width="20" height="10" x="2" y="12" rx="2"/><path d="M6 6h.01"/><path d="M10 6h.01"/></svg>
                    <span class="fab-label">Servidor</span>
                </button>
                <button onclick="setMode('camera')" id="tool-camera" class="fab-item-btn tool-btn" style="color: #60a5fa">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    <span class="fab-label">Câmera</span>
                </button>
                <button onclick="setMode('switch')" id="tool-switch" class="fab-item-btn tool-btn" style="color: #34d399">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M14 18h.01"/><path d="M2 10V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4"/></svg>
                    <span class="fab-label">Switch</span>
                </button>
                <button onclick="setMode('converter')" id="tool-converter" class="fab-item-btn tool-btn" style="color: #fbbf24">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span class="fab-label">Conversor</span>
                </button>
                <button onclick="toggleLinking()" id="link-btn" class="fab-item-btn tool-btn" style="color: #94a3b8">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54"/></svg>
                    <span class="fab-label">Vincular</span>
                </button>
            </div>
        </div>

        <div id="map"></div>

        <!-- Modal Senha -->
        <div id="password-modal" class="fixed inset-0 z-[7000] hidden flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm animate-in fade-in">
            <div class="w-full max-w-xs bg-slate-900 border-2 border-slate-700 rounded-3xl p-8 shadow-3xl text-center">
                <h3 class="text-lg font-black uppercase mb-6 text-white tracking-widest">Desbloquear</h3>
                <input type="password" id="unlock-pass" class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl p-4 text-center text-xl tracking-[0.5em] mb-4 outline-none text-white" placeholder="•••••">
                <button onclick="checkUnlock()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase text-white shadow-lg">Entrar</button>
            </div>
        </div>

        <!-- Ajustes -->
        <div id="settings-modal" class="fixed inset-0 z-[6000] hidden flex items-center justify-center p-4 sm:p-6 animate-in fade-in">
            <div class="w-full max-w-md bg-slate-900 border-2 border-slate-700 rounded-3xl sm:rounded-[2.5rem] shadow-3xl overflow-hidden">
                <div class="p-6 sm:p-8 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                    <h2 class="text-xl font-black uppercase italic text-white">Ajustes</h2>
                    <button onclick="closeSettings()" class="text-slate-500 hover:text-white transition-all"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                </div>
                <div class="p-6 sm:p-8 space-y-4 text-white">
                    <button onclick="triggerNUUOImport()" class="w-full flex items-center justify-between p-4 bg-slate-800 border-2 border-slate-700 rounded-xl">
                        <span class="text-xs font-bold uppercase">Importar CSV NUUO</span>
                    </button>
                    <button onclick="triggerImageMap()" class="w-full flex items-center justify-between p-4 bg-slate-800 border-2 border-slate-700 rounded-xl">
                        <span class="text-xs font-bold uppercase">Planta Baixa (Imagem)</span>
                    </button>
                    <div class="pt-2 flex items-center justify-between">
                        <span class="text-[10px] font-black uppercase text-slate-500">Escala Dashboard 4K</span>
                        <input type="checkbox" id="mode-4k" onchange="toggle4KMode(this)" class="w-6 h-6 rounded bg-slate-800 border-slate-700 text-blue-600">
                    </div>
                    <input type="file" id="nuuo-file-input" class="hidden" accept=".csv" onchange="handleNUUOFile(this)">
                    <input type="file" id="map-image-input" class="hidden" accept="image/*" onchange="handleImageMap(this)">
                </div>
            </div>
        </div>

        <!-- Painel Detalhes -->
        <div id="details-panel" class="fixed right-6 top-24 bottom-24 w-80 bg-slate-900 border-2 border-slate-800 rounded-[2.5rem] p-6 sm:p-8 z-[1000] hidden flex flex-col shadow-3xl mobile-full">
            <div id="details-content" class="flex-1 overflow-y-auto space-y-6"></div>
        </div>

        <!-- Alertas -->
        <div id="alert-container" class="fixed bottom-24 right-4 sm:bottom-10 sm:right-10 z-[3000] flex flex-col space-y-3 pointer-events-none w-full max-w-[calc(100%-2rem)] sm:max-w-sm"></div>

        <!-- Barra de Desenho -->
        <div id="path-edit-bar" class="fixed top-20 left-4 right-4 sm:left-1/2 sm:right-auto sm:-translate-x-1/2 z-[2000] hidden bg-blue-700 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between sm:gap-6 border-2 border-blue-400">
            <span class="text-[10px] font-black uppercase">Desenhando Cabo</span>
            <div class="flex space-x-2">
                <button onclick="savePath()" class="bg-white text-blue-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Ok</button>
                <button onclick="clearPath()" class="bg-blue-800 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA INFRASEGURA V3.5 ---
        let nodes = []; let map; let polylines = []; let selectedId = null;
        let isLinking = false; let linkSourceId = null; let isDrawingPath = false;
        let pathDrawingId = null; let tempPathPoints = []; let tempPolyline = null;
        let activeStatuses = {}; let currentMode = null; let isMenuOpen = false;
        let isLocked = false; let logoClicks = 0; let logoTimer = null;
        let imageOverlay = null; let baseTileLayer = null;

        // Gestão de Camadas de Clusters Lógicos
        let switchClusters = {}; // switchId -> L.markerClusterGroup
        let individualLayer = null;

        const typeCounters = { server: 0, camera: 0, switch: 0, converter: 0 };
        const CONFIG = {
            server: { label: 'Servidor', color: '#a78bfa', hasIp: true, icon: '<rect width="20" height="10" x="2" y="2" rx="2"/><rect width="20" height="10" x="2" y="12" rx="2"/><path d="M6 6h.01"/><path d="M10 6h.01"/>' },
            camera: { label: 'Câmera', color: '#3b82f6', hasIp: true, icon: '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>' },
            switch: { label: 'Switch', color: '#10b981', hasIp: false, icon: '<rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M14 18h.01"/><path d="M2 10V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4"/>' },
            converter: { label: 'Conversor', color: '#f59e0b', hasIp: false, icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>' }
        };

        window.onload = () => {
            map = L.map('map', { zoomControl: false, tap: true, maxZoom: 18 }).setView([-23.5505, -46.6333], 15);
            baseTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            individualLayer = L.layerGroup().addTo(map);

            map.on('click', (e) => {
                if (isDrawingPath) { tempPathPoints.push([e.latlng.lat, e.latlng.lng]); updateTempPolyline(); return; }
                if (currentMode) addNode(currentMode, e.latlng, false);
                else { closePanel(); closeLogoMenu(); }
            });
        };

        // --- LÓGICA DE RENDERIZAÇÃO (Clustering por Switch) ---
        function render() {
            // 1. Limpar camadas
            polylines.forEach(p => map.removeLayer(p)); polylines = [];
            individualLayer.clearLayers();
            Object.values(switchClusters).forEach(c => map.removeLayer(c));
            switchClusters = {};

            const diag = getDiagnostics();

            nodes.forEach(node => {
                const crit = diag.some(a => a.id === node.id);
                const off = CONFIG[node.type].hasIp ? activeStatuses[node.id] === 'offline' : false;
                const isSelected = (selectedId === node.id);
                let color = CONFIG[node.type].color;
                if (off) color = '#ef4444'; if (crit) color = '#f97316';
                
                const icon = L.divIcon({ 
                    className: '', 
                    html: `<div id="pin-${node.id}" class="marker-pin ${crit ? 'pulse-orange' : ''} ${isSelected ? 'selected' : ''}" style="background-color: ${color}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">${CONFIG[node.type].icon}</svg></div>`, 
                    iconSize: [40, 40], 
                    iconAnchor: [20, 40] 
                });

                const m = L.marker([node.lat, node.lng], { 
                    icon, 
                    draggable: !isLocked,
                    bubblingMouseEvents: false
                });

                m.on('click', (e) => { L.DomEvent.stopPropagation(e); handleNodeClick(node.id); });
                m.on('dragend', (e) => { const p = e.target.getLatLng(); node.lat = p.lat; node.lng = p.lng; render(); });

                // AGREGAR POR SWITCH
                if (node.type === 'camera' && node.parentId) {
                    const parent = nodes.find(n => n.id === node.parentId);
                    if (parent && parent.type === 'switch') {
                        if (!switchClusters[node.parentId]) {
                            switchClusters[node.parentId] = L.markerClusterGroup({
                                iconCreateFunction: (cluster) => {
                                    return L.divIcon({ 
                                        html: `<div>${cluster.getChildCount()}</div>`, 
                                        className: 'camera-cluster-custom', 
                                        iconSize: L.point(40, 40) 
                                    });
                                },
                                showCoverageOnHover: false,
                                zoomToBoundsOnClick: true,
                                spiderfyOnMaxZoom: true,
                                maxClusterRadius: 40 // Distância sensível para agrupar
                            }).addTo(map);
                        }
                        switchClusters[node.parentId].addLayer(m);
                    } else {
                        individualLayer.addLayer(m);
                    }
                } else {
                    individualLayer.addLayer(m);
                }

                // Linhas
                if (node.parentId) {
                    const pNode = nodes.find(it => it.id === node.parentId);
                    if (pNode) {
                        const path = [[node.lat, node.lng], ...node.pathPoints, [pNode.lat, pNode.lng]];
                        const poly = L.polyline(path, { color: (off || crit) ? '#ef4444' : color, weight: 6, opacity: 0.9, className: (off || crit) ? 'offline-line' : 'data-flow-line' }).addTo(map);
                        polylines.push(poly);
                    }
                }
            });
            renderAlerts(diag);
        }

        // --- SEGURANÇA ---
        function handleLogoInteraction() {
            if (isLocked) {
                logoClicks++; clearTimeout(logoTimer);
                if (logoClicks >= 3) { logoClicks = 0; openPasswordModal(); }
                else logoTimer = setTimeout(() => { logoClicks = 0; }, 500);
            } else toggleLogoMenu();
        }
        function toggleAppLock() { isLocked = true; resetTools(); document.body.classList.add('locked'); document.getElementById('fab-container').style.display = 'none'; toggleLogoMenu(); showToast("PROTEGIDO"); closePanel(); render(); }
        function openPasswordModal() { document.getElementById('password-modal').classList.remove('hidden'); }
        function closePasswordModal() { document.getElementById('password-modal').classList.add('hidden'); }
        function checkUnlock() { if (document.getElementById('unlock-pass').value === '12345') { isLocked = false; document.body.classList.remove('locked'); document.getElementById('fab-container').style.display = 'flex'; closePasswordModal(); render(); } else showToast("SENHA INCORRETA"); }

        // --- MAPA ---
        function handleImageMap(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const bounds = map.getBounds();
                if (imageOverlay) map.removeLayer(imageOverlay);
                if (baseTileLayer) map.removeLayer(baseTileLayer);
                imageOverlay = L.imageOverlay(e.target.result, bounds, { interactive: false }).addTo(map);
                map.setMaxBounds(bounds); map.fitBounds(bounds);
                toggleLogoMenu();
            };
            reader.readAsDataURL(file);
        }
        function resetToWorldMap() { if (imageOverlay) map.removeLayer(imageOverlay); if (!baseTileLayer._map) baseTileLayer.addTo(map); map.setMaxBounds(null); toggleLogoMenu(); }

        // --- CORE ---
        function addNode(type, latlng, openPanel = true) {
            const id = 'n' + Math.random().toString(36).substr(2, 9); typeCounters[type]++;
            const name = `${CONFIG[type].label} ${typeCounters[type]}`;
            const newNode = { id, type, lat: latlng.lat, lng: latlng.lng, name, parentId: null, pathPoints: [], ip: CONFIG[type].hasIp ? `192.168.1.${10 + nodes.length}` : null };
            nodes.push(newNode); if (CONFIG[type].hasIp) activeStatuses[id] = 'online';
            render(); if (openPanel) openDetails(id);
        }

        function handleNodeClick(id) {
            if (isLinking && !isLocked) {
                if (!linkSourceId) { linkSourceId = id; showToast(`Pai para ${nodes.find(n => n.id === id).name}?`); }
                else { nodes.find(n => n.id === linkSourceId).parentId = id; resetTools(); render(); showToast("CONECTADO"); }
                return;
            }
            if (!currentMode) openDetails(id);
        }

        function openDetails(id) {
            selectedId = id; const n = nodes.find(it => it.id === id);
            const panel = document.getElementById('details-panel'); panel.classList.add('show');
            document.getElementById('details-content').innerHTML = `
                <div class="bg-slate-950 p-6 rounded-3xl border-2 border-slate-800 text-center uppercase"><input type="text" value="${n.name}" onchange="updateName('${id}', this.value)" ${isLocked ? 'disabled' : ''} class="bg-transparent text-lg font-black border-none p-0 focus:ring-0 w-full text-white text-center"></div>
                <div class="p-5 bg-slate-800/40 rounded-3xl text-center border border-slate-800">
                    <p class="text-[9px] font-black uppercase text-slate-500 mb-2">Conectado a: ${n.parentId ? nodes.find(p => p.id === n.parentId).name : 'Dispositivo Raiz'}</p>
                    ${n.parentId && !isLocked ? `<button onclick="startPathEdit('${id}')" class="w-full py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Editar Cabo</button>` : ''}
                </div>
                ${CONFIG[n.type].hasIp ? `<div class="p-5 bg-slate-800/40 rounded-3xl text-center border border-slate-800">
                    <input type="text" value="${n.ip}" onchange="updateIp('${id}', this.value)" ${isLocked ? 'disabled' : ''} class="bg-slate-950 w-full p-3 rounded-xl border border-slate-800 font-mono text-center text-blue-400 mb-4">
                    <button onclick="toggleStatus('${id}')" class="w-full py-4 rounded-xl text-[10px] font-black ${activeStatuses[id] === 'offline' ? 'bg-emerald-600' : 'bg-red-600'} text-white">SIMULAR STATUS</button>
                </div>` : ''}
                <button onclick="deleteNode('${id}')" class="w-full py-3 text-[10px] font-bold text-slate-600 hover:text-red-500 uppercase mt-4">Remover</button>
            `;
            render();
        }

        // --- UTILS UI ---
        function toggleFab() { if(isLocked) return; if (currentMode || isLinking) { resetTools(); closeFab(); return; } isMenuOpen = !isMenuOpen; document.getElementById('fab-items').classList.toggle('open', isMenuOpen); document.getElementById('fab-main').classList.toggle('active', isMenuOpen); }
        function closeFab() { isMenuOpen = false; document.getElementById('fab-items').classList.remove('open'); document.getElementById('fab-main').classList.remove('active'); }
        function setMode(m) { if(isLocked) return; resetTools(); currentMode = m; document.getElementById(`tool-${m}`).classList.add('selected'); document.getElementById('fab-main').classList.add('active'); document.getElementById('mode-badge').style.display = 'block'; }
        function resetTools() { currentMode = null; isLinking = false; linkSourceId = null; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected')); document.getElementById('mode-badge').style.display = 'none'; document.getElementById('fab-main').classList.remove('active'); }
        function closePanel() { const p = document.getElementById('details-panel'); p.classList.remove('show'); selectedId = null; render(); }
        function toggleLogoMenu() { if(isLocked) return; document.getElementById('logo-menu').classList.toggle('show'); }
        function openSettings() { if(isLocked) return; document.getElementById('settings-modal').classList.remove('hidden'); closeFab(); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function toggleLinking() { isLinking = !isLinking; document.getElementById('link-btn').classList.toggle('selected', isLinking); document.getElementById('fab-main').classList.toggle('active', isLinking); }
        function toggle4KMode(cb) { document.body.classList.toggle('mode-4k-active', cb.checked); map.invalidateSize(); }
        function updateName(id, val) { nodes.find(n => n.id === id).name = val; render(); }
        function updateIp(id, val) { nodes.find(n => n.id === id).ip = val; render(); }
        function toggleStatus(id) { activeStatuses[id] = activeStatuses[id] === 'offline' ? 'online' : 'offline'; openDetails(id); }
        function deleteNode(id) { nodes = nodes.filter(n => n.id !== id); nodes.forEach(n => { if (n.parentId === id) n.parentId = null; }); closePanel(); render(); }
        function locateMe() { navigator.geolocation.getCurrentPosition(p => map.flyTo([p.coords.latitude, p.coords.longitude], 17), () => showToast("Erro GPS")); }
        function toggleView(v) { document.getElementById('list-view').classList.toggle('hidden', v === 'map'); if(v === 'list') renderList(); closePanel(); }
        function triggerNUUOImport() { document.getElementById('nuuo-file-input').click(); }
        function triggerImageMap() { document.getElementById('map-image-input').click(); }
        function handleNUUOFile(i) { showToast("Câmeras Importadas"); closeSettings(); }
        function showToast(m) { const t = document.createElement('div'); t.className = "fixed bottom-24 right-4 sm:bottom-10 sm:right-1/2 sm:translate-x-1/2 px-8 py-3 bg-slate-900 text-white text-[9px] font-black uppercase rounded-full shadow-2xl z-[8000] border-2 border-slate-800 animate-in fade-in slide-in-from-bottom-5"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
        function getDiagnostics() {
            const alerts = []; const kids = {};
            nodes.forEach(n => { if (n.parentId) { if (!kids[n.parentId]) kids[n.parentId] = []; kids[n.parentId].push(n); } });
            const isDown = (id) => {
                const n = nodes.find(it => it.id === id); if (!n) return true;
                if (CONFIG[n.type].hasIp) return activeStatuses[id] === 'offline';
                const c = kids[id] || []; if (c.length === 0) return false;
                return c.every(item => isDown(item.id));
            };
            nodes.filter(n => n.type === 'converter').forEach(c => { if (isDown(c.id) && kids[c.id]?.length > 0) alerts.push({ id: c.id, name: c.name, type: 'conversor', msg: "Falha Link Fibra" }); });
            nodes.filter(n => n.type === 'switch').forEach(s => { if (!alerts.some(a => a.id === s.parentId) && isDown(s.id) && kids[s.id]?.length > 0) alerts.push({ id: s.id, name: s.name, type: 'switch', msg: "Setor Inacessível" }); });
            nodes.filter(n => CONFIG[n.type].hasIp).forEach(a => { if (activeStatuses[a.id] === 'offline') alerts.push({ id: a.id, name: a.name, type: CONFIG[a.type].label, msg: "Timeout de Ping" }); });
            return alerts;
        }
        function renderAlerts(diag) { document.getElementById('alert-container').innerHTML = diag.map(a => `<div class="bg-slate-900 border-l-4 border-red-500 p-4 rounded-r-2xl shadow-3xl animate-in slide-in-from-right-10 flex items-start space-x-4 pointer-events-auto border-y border-r border-slate-800"><div class="p-2 bg-red-600 text-white rounded-xl shadow-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="text-[8px] font-black text-red-500 uppercase tracking-widest mb-0.5">${a.msg}</div><h5 class="text-xs font-black text-white uppercase italic leading-none">${a.name}</h5></div></div>`).join(''); }
        function renderList() { document.getElementById('list-content').innerHTML = nodes.map(n => `<div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center justify-between"><div class="flex items-center space-x-4"><div class="p-3 bg-slate-950 rounded-xl" style="color: ${CONFIG[n.type].color}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${CONFIG[n.type].icon}</svg></div><div><h4 class="font-black text-base text-white uppercase">${n.name}</h4><p class="text-[9px] font-bold text-slate-600">${n.ip || 'Passivo'}</p></div></div><button onclick="toggleView('map'); map.flyTo([${n.lat}, ${n.lng}], 18); openDetails('${n.id}')" class="p-3 bg-slate-800 text-slate-500 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button></div>`).join(''); }
        function startPathEdit(id) { if(isLocked) return; isDrawingPath = true; pathDrawingId = id; tempPathPoints = [...nodes.find(n => n.id === id).pathPoints]; document.getElementById('path-edit-bar').classList.remove('hidden'); closePanel(); updateTempPolyline(); }
        function savePath() { nodes.find(n => n.id === pathDrawingId).pathPoints = tempPathPoints; cancelPathEdit(); render(); }
        function clearPath() { tempPathPoints = []; updateTempPolyline(); }
        function cancelPathEdit() { isDrawingPath = false; pathDrawingId = null; if (tempPolyline) map.removeLayer(tempPolyline); tempPolyline = null; document.getElementById('path-edit-bar').classList.add('hidden'); }
        function updateTempPolyline() { if (tempPolyline) map.removeLayer(tempPolyline); const node = nodes.find(n => n.id === pathDrawingId); const pNode = nodes.find(it => it.id === node.parentId); if (!node || !pNode) return; tempPolyline = L.polyline([[node.lat, node.lng], ...tempPathPoints, [pNode.lat, pNode.lng]], { color: '#3b82f6', weight: 4, dashArray: '10, 10' }).addTo(map); }
    </script>
</body>
</html>
